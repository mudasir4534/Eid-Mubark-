<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Eid Wish | Mudassir</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f9f295;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; font-family: 'Cinzel', serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* VIP Start Button */
        #launch-pad {
            position: fixed; z-index: 1000; text-align: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .vip-button {
            padding: 25px 60px;
            font-size: 24px;
            font-weight: bold;
            color: var(--gold-light);
            background: var(--glass);
            border: 2px solid var(--gold);
            border-radius: 15px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            letter-spacing: 5px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3), inset 0 0 10px rgba(212, 175, 55, 0.2);
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .vip-button:hover {
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.6);
            transform: translateY(-5px);
            background: rgba(212, 175, 55, 0.1);
        }

        .vip-button::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .vip-button:hover::before { left: 100%; }

        /* Professional Mosque Scene */
        #mosque-scene {
            position: absolute; bottom: 0; width: 100%; height: 50vh;
            display: none; opacity: 0; z-index: 1;
            transition: opacity 2s ease;
        }

        .mosque-vector {
            width: 100%; height: 100%;
            fill: #0a0a0a; stroke: var(--gold); stroke-width: 0.3;
        }

        /* Content Display */
        #main-display {
            display: none; text-align: center; z-index: 10;
        }

        .adv-label {
            font-size: 1.8rem; letter-spacing: 12px; color: #fff;
            margin-bottom: 20px; text-shadow: 0 0 15px var(--gold);
        }

        .main-title {
            font-size: 5rem; font-weight: 900;
            background: linear-gradient(to bottom, #cf9d38 22%, #ffefbb 45%, #bf953f 50%, #fcf6ba 67%, #b38728 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4));
        }

        .pulse { animation: pulse-glow 3s infinite; }
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.02); filter: brightness(1.5); }
        }

        .signature {
            font-family: 'Great Vibes', cursive; font-size: 3rem;
            color: var(--gold-light); margin-top: 40px;
        }

        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <div id="launch-pad">
        <button class="vip-button" onclick="launchVIP()">OPEN VIP WISH</button>
    </div>

    <div id="mosque-scene">
        <svg class="mosque-vector" viewBox="0 0 1000 300" preserveAspectRatio="none">
            <path d="M500,300 L500,100 Q500,20 400,20 Q300,20 300,100 L300,300 Z" fill="#050505"/>
            <path d="M500,100 Q500,20 400,20 Q300,20 300,100" fill="none" stroke="#d4af37" stroke-width="1"/>
            <path d="M250,300 L250,150 Q250,100 180,100 Q110,100 110,150 L110,300 Z" fill="#050505"/>
            <path d="M890,300 L890,150 Q890,100 820,100 Q750,100 750,150 L750,300 Z" fill="#050505"/>
            <rect x="50" y="50" width="15" height="250" fill="#0a0a0a" stroke="#d4af37" stroke-width="0.5"/>
            <rect x="935" y="50" width="15" height="250" fill="#0a0a0a" stroke="#d4af37" stroke-width="0.5"/>
            <polygon points="57,50 50,30 65,30 58,50" fill="#d4af37"/>
            <polygon points="942,50 935,30 950,30 943,50" fill="#d4af37"/>
        </svg>
    </div>

    <canvas id="stage"></canvas>

    <div id="main-display">
        <div id="type-adv" class="adv-label"></div>
        <div id="type-eid" class="main-title"></div>
        <div class="signature">From Mudassir</div>
    </div>

<script>
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    let fworks = [];
    let parts = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function launchVIP() {
        const lp = document.getElementById('launch-pad');
        lp.style.opacity = '0';
        lp.style.transform = 'scale(2)';
        
        setTimeout(() => {
            lp.style.display = 'none';
            document.getElementById('mosque-scene').style.display = 'block';
            setTimeout(() => document.getElementById('mosque-scene').style.opacity = '1', 100);
            
            document.getElementById('main-display').style.display = 'block';
            startVIPTyping();
            animateStage();
        }, 800);
    }

    const txt1 = "ADVANCE";
    const txt2 = "EID MUBARAK";
    let idx1 = 0, idx2 = 0;

    function startVIPTyping() {
        if (idx1 < txt1.length) {
            document.getElementById('type-adv').innerHTML += txt1.charAt(idx1);
            idx1++;
            setTimeout(startVIPTyping, 100);
        } else if (idx2 < txt2.length) {
            document.getElementById('type-eid').innerHTML += txt2.charAt(idx2);
            idx2++;
            setTimeout(startVIPTyping, 120);
        } else {
            document.getElementById('type-eid').classList.add('pulse');
        }
    }

    class Firework {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height;
            this.ty = Math.random() * (canvas.height * 0.4);
            this.v = 6 + Math.random() * 4;
            this.c = `hsl(${Math.random() * 360}, 100%, 65%)`;
            this.done = false;
        }
        update() {
            this.y -= this.v;
            if (this.y <= this.ty) {
                this.explode();
                return true;
            }
            return false;
        }
        draw() {
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, 7); ctx.fill();
        }
        explode() {
            for(let i=0; i<70; i++) parts.push(new Particle(this.x, this.y, this.c));
        }
    }

    class Particle {
        constructor(x, y, c) {
            this.x = x; this.y = y; this.c = c;
            this.ang = Math.random() * Math.PI * 2;
            this.vel = Math.random() * 5 + 2;
            this.vx = Math.cos(this.ang) * this.vel;
            this.vy = Math.sin(this.ang) * this.vel;
            this.a = 1;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.vy += 0.1; this.a -= 0.015;
        }
        draw() {
            ctx.globalAlpha = this.a;
            ctx.fillStyle = this.c;
            ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, 7); ctx.fill();
        }
    }

    function animateStage() {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(0,0,canvas.width, canvas.height);

        if(Math.random() < 0.05) fworks.push(new Firework());

        fworks = fworks.filter(f => {
            let hit = f.update();
            if(!hit) f.draw();
            return !hit;
        });

        parts = parts.filter(p => {
            p.update(); p.draw();
            return p.a > 0;
        });

        requestAnimationFrame(animateStage);
    }
</script>
</body>
</html>
